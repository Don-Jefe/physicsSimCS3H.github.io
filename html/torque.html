<!doctype html>
<html lang="en">
    <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Torque Simulation</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/styles.css">
  </head>

  <body>
    <main>
      <h1>Torque Simulator</h1>
      
      <section id="sim-wrap">
        <div id="sim-frame">
          <canvas id="sim"></canvas>
        </div>

        <div id="controls">
          <h2 class="panel-title">Controls</h2>
          
          <label>
            Rod Length:
            <span id="length-val">2</span> m
            <input id="length" type="range" min="1" max="5" step="0.1" value="2">
          </label>

          <label>
            Force 1:
            <span id="force1-val">10</span> N
            <input id="force1" type="range" min="-20" max="20" step="1" value="10">
          </label>

          <label>
            Force 2:
            <span id="force2-val">-10</span> N
            <input id="force2" type="range" min="-20" max="20" step="1" value="-10">
          </label>

          <label>
            Force 1 Position:
            <span id="pos1-val">-0.5</span> m
            <input id="pos1" type="range" min="-2.5" max="2.5" step="0.1" value="-0.5">
          </label>

          <label>
            Force 2 Position:
            <span id="pos2-val">0.5</span> m
            <input id="pos2" type="range" min="-2.5" max="2.5" step="0.1" value="0.5">
          </label>

          <div class="buttons">
            <button id="start">Start</button>
            <button id="pause">Pause</button>
            <button id="reset">Reset</button>
          </div>

          <div id="stats">
            <div class="stat">
              <div class="stat-label">Angle</div>
              <div class="stat-value">
                <span id="angle">0.00</span> °
              </div>
            </div>

            <div class="stat">
              <div class="stat-label">Angular Velocity</div>
              <div class="stat-value">
                <span id="omega">0.00</span> rad/s
              </div>
            </div>

            <div class="stat">
              <div class="stat-label">Net Torque</div>
              <div class="stat-value">
                <span id="torque">0.00</span> N·m
              </div>
            </div>
          </div>
        </div>
      </section>

      <nav class="page-nav">
        <a href="../index.html" class="nav-link"> Back to Home</a>
      </nav>
    </main>

    <script src="../js/torque.js"></script>
  </body>
</html>
